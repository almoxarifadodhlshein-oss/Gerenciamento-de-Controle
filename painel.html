<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciamento de controle</title>
    <link rel="icon" type="image/png" href="images/logo.almoxarifado.png" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      href="https://fonts.googleapis.com/css?family=Work+Sans:400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link href="./css/main.css" rel="stylesheet" />
  </head>

  <body>
    <div class="page">
      <header
        class="topbar"
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          padding-right: 30px;
        "
      >
        <div class="topbar__brand">
          <img src="images/v44_12.png" alt="Logo DHL" class="logo" />
        </div>

        <div
          class="user-info"
          style="display: flex; align-items: center; gap: 15px"
        >
          <span
            id="user-display-name"
            style="
              font-weight: 500;
              font-family: &quot;Work Sans&quot;, sans-serif;
            "
            >Carregando...</span
          >
          <button
            id="btn-logout"
            style="
              background: #d40511;
              color: white;
              border: transparent;
              padding: 5px 15px;
              cursor: pointer;
              font-weight: 500;
              border-radius: 4px;
            "
          >
            Sair
          </button>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <nav class="menu">
            <a href="painel.html" class="menu__item menu__item--active"
              >PAINEL</a
            >
            <a href="almoxarifado.html" class="menu__item">ALMOXARIFADO</a>
            <a href="compras.html" class="menu__item">COMPRAS</a>
            <a href="facilities.html" class="menu__item">FACILITIES</a>
          </nav>
        </aside>

        <main class="content">
          <h1 class="title">DASHBOARD OPERACIONAL</h1>
          <section class="cards">

            <article class="card">
              <h2>TOTAL DE SAÍDAS</h2>
              <p id="metric-saidas" style="font-size: 36px; font-weight: bold; margin: 15px 0; color: #333;">...</p>
            </article>

            <article class="card">
              <h2>VALOR EM ESTOQUE</h2>
              <p id="metric-valor" style="font-size: 36px; font-weight: bold; margin: 15px 0; color: #333;">...</p>
            </article>

            <article class="card">
              <h2>ESTOQUE CRÍTICO</h2>
              <p id="metric-critico" style="font-size: 36px; font-weight: bold; margin: 15px 0; color: #d9381e;">...</p>
            </article>
          </section>
        </main>
      </div>
    </div>

    <script src="painel.js"></script>
  </body>
</html>
